<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Products</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-3xl mx-auto bg-white rounded-xl shadow p-6">
    <h1 class="text-2xl font-bold mb-4">เพิ่มสินค้า</h1>

    <div class="grid gap-4 mb-6">
      <input id="name" class="border rounded p-2" placeholder="ชื่อสินค้า">
      <input id="price" type="number" class="border rounded p-2" placeholder="ราคา">
      <input id="category" class="border rounded p-2" placeholder="หมวดหลัก เช่น ฟอนต์">
      <input id="subcategory" class="border rounded p-2" placeholder="หมวดย่อย เช่น ฟอนต์ลายมือ">

      <button id="saveBtn" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
        บันทึกสินค้า
      </button>
    </div>

    <h2 class="text-xl font-bold mb-3">รายการสินค้า</h2>
    <div id="productList" class="space-y-2"></div>
  </div>

  <script type="module" src="/src/admin.js"></script>
</body>
</html>
